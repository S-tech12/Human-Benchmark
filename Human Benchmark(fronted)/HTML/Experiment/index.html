<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Memory Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #grid {
            display: grid;
            gap: 5px;
            margin: 20px auto;
        }
        .tile {
            width: 50px;
            height: 50px;
            background-color: lightgray;
            border: 1px solid #ccc;
            cursor: pointer;
        }
        .highlight {
            background-color: lightblue;
        }
        #status {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>Visual Memory Game</h1>
    <div id="grid"></div>
    <button id="startBtn">Start Game</button>
    <div id="status"></div>

    <script src="visualMemory.js"></script>
</body>
</html>
